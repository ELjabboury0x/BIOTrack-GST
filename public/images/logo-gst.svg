<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- GST Medical Cross Pattern -->
  <defs>
    <linearGradient id="gstGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Diamond Mosaic Pattern (inspired by Moroccan zellige) -->
  <g transform="translate(5, 5)">
    <!-- Row 1 -->
    <rect x="12" y="0" width="8" height="8" rx="1" fill="url(#gstGrad)" opacity="0.9"/>
    <rect x="22" y="0" width="8" height="8" rx="1" fill="url(#gstGrad)" opacity="0.7"/>
    <rect x="32" y="0" width="8" height="8" rx="1" fill="url(#gstGrad)" opacity="0.5"/>
    <!-- Row 2 -->
    <rect x="7" y="10" width="8" height="8" rx="1" fill="url(#gstGrad)" opacity="0.7"/>
    <rect x="17" y="10" width="8" height="8" rx="1" fill="url(#accentGrad)" opacity="0.9"/>
    <rect x="27" y="10" width="8" height="8" rx="1" fill="url(#gstGrad)" opacity="0.8"/>
    <rect x="37" y="10" width="8" height="8" rx="1" fill="url(#gstGrad)" opacity="0.6"/>
    <!-- Row 3 -->
    <rect x="2" y="20" width="8" height="8" rx="1" fill="url(#gstGrad)" opacity="0.5"/>
    <rect x="12" y="20" width="8" height="8" rx="1" fill="url(#gstGrad)" opacity="0.8"/>
    <rect x="22" y="20" width="8" height="8" rx="1" fill="url(#accentGrad)" opacity="1"/>
    <rect x="32" y="20" width="8" height="8" rx="1" fill="url(#gstGrad)" opacity="0.8"/>
    <rect x="42" y="20" width="8" height="8" rx="1" fill="url(#gstGrad)" opacity="0.5"/>
    <!-- Row 4 -->
    <rect x="7" y="30" width="8" height="8" rx="1" fill="url(#gstGrad)" opacity="0.7"/>
    <rect x="17" y="30" width="8" height="8" rx="1" fill="url(#accentGrad)" opacity="0.9"/>
    <rect x="27" y="30" width="8" height="8" rx="1" fill="url(#gstGrad)" opacity="0.8"/>
    <rect x="37" y="30" width="8" height="8" rx="1" fill="url(#gstGrad)" opacity="0.6"/>
    <!-- Row 5 -->
    <rect x="12" y="40" width="8" height="8" rx="1" fill="url(#gstGrad)" opacity="0.6"/>
    <rect x="22" y="40" width="8" height="8" rx="1" fill="url(#gstGrad)" opacity="0.7"/>
    <rect x="32" y="40" width="8" height="8" rx="1" fill="url(#gstGrad)" opacity="0.5"/>
  </g>

  <!-- Heartbeat Line -->
  <path d="M 55 30 L 62 30 L 65 20 L 68 40 L 71 25 L 74 35 L 77 30 L 84 30" 
        stroke="url(#accentGrad)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- GST Text -->
  <text x="90" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="800" fill="url(#gstGrad)" letter-spacing="2">GST</text>
  
  <!-- GMAO Subtitle -->
  <text x="90" y="45" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#64748b" letter-spacing="1.5">GMAO SYSTEM</text>
  
  <!-- Decorative wave under GST -->
  <path d="M 90 32 Q 105 32, 108 34 Q 112 36, 120 34 Q 128 32, 140 34" 
        stroke="url(#accentGrad)" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
</svg>
